spring.application.name=${APP_NAME:currencyJournal}

sync.enabled=${SYNC_ENABLED:false}
sync.interval-cron=${SYNC_CRON:0 0 * * * *}


# connect to PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/currencyJournal}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:123}

# Liquibase configuration
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

cbr.api.url=${CBR_API_URL:https://www.cbr-xml-daily.ru/daily_utf8.xml}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:INFO}

spring.jpa.show-sql=${SHOW_SQL:true}